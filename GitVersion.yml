mode: ContinuousDelivery
tag-prefix: 'v'
commit-message-incrementing: Enabled
major-version-bump-message: '\+semver:\s?(breaking|major)'
minor-version-bump-message: '\+semver:\s?(feature|minor)'
patch-version-bump-message: '\+semver:\s?(fix|patch)'
no-bump-message: '\+semver:\s?(none|skip)'
assembly-versioning-scheme: MajorMinorPatch
assembly-file-versioning-scheme: MajorMinorPatchTag
assembly-informational-format: '{SemVer}+{BranchName}.{ShortSha}'
next-version: 0.1.0
legacy-semver-padding: 4
build-metadata-padding: 4
commits-since-version-source-padding: 4
commit-message-incrementing: Enabled
commit-date-format: 'yyyy-MM-dd'

branches:
  main:
    regex: ^master$|^main$
    mode: ContinuousDeployment
    tag: 'dev'
    increment: Patch
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
    source-branches: [ 'release' ]
    tracks-release-branches: false
    is-release-branch: false
    is-mainline: true
  
  # Feature and bugfix branches
  feature:
    regex: ^feature[/-]
    mode: ContinuousDelivery
    tag: ''
    increment: Inherit
    source-branches: [ 'main', 'master' ]
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
    is-release-branch: false
  
  bugfix:
    regex: ^bugfix[/-]
    mode: ContinuousDelivery
    tag: ''
    increment: Inherit
    source-branches: [ 'main', 'master' ]
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
    is-release-branch: false
  
  # Release stages
  release:
    regex: ^release[/-][0-9]+\.[0-9]+\.[0-9]+$
    mode: ContinuousDelivery
    tag: ''  # No tag for final releases
    increment: None
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    source-branches: [ 'main', 'master', 'release/-alpha$', 'release/-rc$', 'release/-beta$' ]
    is-release-branch: true
    pre-release-weight: 50000
  
  release-alpha:
    regex: ^release[/-][0-9]+\.[0-9]+\.[0-9]+-alpha$
    mode: ContinuousDelivery
    tag: 'alpha'
    increment: None
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    source-branches: [ 'main', 'master' ]
    is-release-branch: true
    pre-release-weight: 10000
  
  release-beta:
    regex: ^release[/-][0-9]+\.[0-9]+\.[0-9]+-beta$
    mode: ContinuousDelivery
    tag: 'beta'
    increment: None
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    source-branches: [ 'release/-alpha$' ]
    is-release-branch: true
    pre-release-weight: 20000
  
  release-rc:
    regex: ^release[/-][0-9]+\.[0-9]+\.[0-9]+-rc$
    mode: ContinuousDelivery
    tag: 'rc'
    increment: None
    prevent-increment-of-merged-branch-version: true
    track-merge-target: false
    source-branches: [ 'release/-beta$' ]
    is-release-branch: true
    pre-release-weight: 30000
  
  # Hotfix branches
  hotfix:
    regex: ^hotfix[/-]
    mode: ContinuousDelivery
    tag: 'fix'
    increment: Patch
    prevent-increment-of-merged-branch-version: false
    track-merge-target: false
    source-branches: [ 'main', 'master' ]
    is-release-branch: false

ignore:
  sha: []
